# Spec Kit Workflow Extensions — Project Configuration
# Installed at: .specify/extensions/workflows/workflows-config.yml
#
# Override any value here; defaults come from extension.yml.
# For secrets, use a local override file (auto-gitignored):
#   .specify/extensions/workflows/workflows-config.local.yml
# Or set environment variables using the pattern:
#   SPECKIT_WORKFLOWS_<KEY>  (e.g. SPECKIT_WORKFLOWS_ENHANCE_MAX_TASKS=10)
#
# Config priority (highest wins):
#   env vars > workflows-config.local.yml > this file > extension defaults

enhance:
  # Maximum number of tasks allowed in a single enhancement workflow.
  # If the scope requires more tasks than this limit, the agent will
  # recommend using /speckit.specify instead for a full feature spec.
  # Range: 1–20  |  Default: 7
  max_tasks: 7

  # Minimum number of tasks expected for a valid enhancement.
  # Enhancements with fewer tasks may indicate the change is too trivial
  # and could simply be a direct code edit rather than a workflow.
  # Range: 1–10  |  Default: 3
  min_tasks: 3

bugfix:
  # Whether to require a failing regression test to be written before
  # the fix is implemented (test-first quality gate).
  # Default: true
  require_regression_test: true

review:
  # Minimum checklist items that must be explicitly verified.
  # Default: 5
  min_checklist_items: 5

  # Whether the review must gate the final commit (blocks /speckit.commit
  # if review status is "Needs Changes").
  # Default: true
  gate_commit: true

issue_sync:
  # If true, the hook script attempts to create missing workflow labels in GitHub.
  # Default: true
  bootstrap_labels: true

  # If true, each workflow hook event also posts an issue comment with status text.
  # Default: false
  add_comment: false

  # Optional explicit issue number to sync when automatic detection is not possible.
  # Mirrors environment variable SPECKIT_LINKED_ISSUE.
  linked_issue: ""

  # Optional explicit repository override in owner/repo form.
  # Mirrors environment variable SPECKIT_ISSUE_SYNC_REPO.
  repo: ""

  # Event-to-label/status mappings are configured in:
  #   .specify/extensions/workflows/issue-sync.env
