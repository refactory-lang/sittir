schema_version: "1.0"

workflow:
  id: "refactor-lifecycle"
  name: "Refactor Lifecycle"
  version: "1.0.0"
  author: "Spec Kit Extensions"
  description: "Initialize a refactor, enforce safety reviews, and optionally continue through plan, tasks, and implement."

requires:
  speckit_version: ">=0.7.0"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  request:
    type: string
    required: true
    prompt: "Refactor description"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (for example: copilot, claude, gemini)"

steps:
  - id: verify-extension
    type: shell
    run: >-
      test -f .specify/extensions/workflows/extension.yml || {
        echo 'Install spec-kit-extensions first with specify-extend --all or specify extension add workflows --from <url>.' >&2;
        exit 1;
      }

  - id: init-refactor
    command: speckit.workflows.refactor
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.request }}"

  - id: review-safety-baseline
    type: gate
    message: "Review the refactor spec, testing gaps, and behavioral snapshot. Confirm safety nets are in place before planning."
    options: [approve, reject]
    on_reject: retry

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"

  - id: review-plan
    type: gate
    message: "Review the refactor plan. Confirm test-first sequencing, behavior preservation, and checkpoint strategy before generating tasks."
    options: [approve, reject]
    on_reject: retry

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"

  - id: review-tasks
    type: gate
    message: "Review the refactor tasks. Confirm tests and baseline verification occur before structural changes."
    options: [approve, reject]
    on_reject: retry

  - id: ready-for-implement
    type: gate
    message: "Execute the refactor now? Reject to stop after planning and task generation."
    options: [approve, reject]
    on_reject: skip

  - id: implement-if-approved
    type: if
    condition: "{{ steps.ready-for-implement.output.choice == 'approve' }}"
    then:
      - id: implement
        command: speckit.implement
        integration: "{{ inputs.integration }}"