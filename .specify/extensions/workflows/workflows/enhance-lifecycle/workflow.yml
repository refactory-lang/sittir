schema_version: "1.0"

workflow:
  id: "enhance-lifecycle"
  name: "Enhance Lifecycle"
  version: "1.0.0"
  author: "Spec Kit Extensions"
  description: "Initialize a minor enhancement, review the enhancement brief, and optionally continue straight to implementation."

requires:
  speckit_version: ">=0.7.0"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  request:
    type: string
    required: true
    prompt: "Enhancement description"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (for example: copilot, claude, gemini)"

steps:
  - id: verify-extension
    type: shell
    run: >-
      test -f .specify/extensions/workflows/extension.yml || {
        echo 'Install spec-kit-extensions first with specify-extend --all or specify extension add workflows --from <url>.' >&2;
        exit 1;
      }

  - id: init-enhance
    command: speckit.workflows.enhance
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.request }}"

  - id: review-enhancement
    type: gate
    message: "Review the enhancement brief. Confirm it stays within minor-enhancement scope, the task count is appropriate, and the acceptance criteria are concrete before implementation."
    options: [approve, reject]
    on_reject: retry

  - id: ready-for-implement
    type: gate
    message: "Execute the enhancement now? Reject to stop after generating the enhancement document."
    options: [approve, reject]
    on_reject: skip

  - id: implement-if-approved
    type: if
    condition: "{{ steps.ready-for-implement.output.choice == 'approve' }}"
    then:
      - id: implement
        command: speckit.implement
        integration: "{{ inputs.integration }}"