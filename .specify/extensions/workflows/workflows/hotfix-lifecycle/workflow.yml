schema_version: "1.0"

workflow:
  id: "hotfix-lifecycle"
  name: "Hotfix Lifecycle"
  version: "1.0.0"
  author: "Spec Kit Extensions"
  description: "Initialize an emergency hotfix, review the incident artifacts, and optionally continue through expedited planning, tasks, and implementation."

requires:
  speckit_version: ">=0.7.0"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  request:
    type: string
    required: true
    prompt: "Incident description"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (for example: copilot, claude, gemini)"

steps:
  - id: verify-extension
    type: shell
    run: >-
      test -f .specify/extensions/workflows/extension.yml || {
        echo 'Install spec-kit-extensions first with specify-extend --all or specify extension add workflows --from <url>.' >&2;
        exit 1;
      }

  - id: init-hotfix
    command: speckit.workflows.hotfix
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.request }}"

  - id: review-incident
    type: gate
    message: "Review the hotfix incident record. Confirm severity, blast radius, and immediate mitigation plan before creating the expedited plan."
    options: [approve, reject]
    on_reject: retry

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"

  - id: review-plan
    type: gate
    message: "Review the expedited hotfix plan. Confirm rollback, verification, and monitoring steps are explicit before generating tasks."
    options: [approve, reject]
    on_reject: retry

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"

  - id: review-tasks
    type: gate
    message: "Review the hotfix task breakdown. Confirm it stays minimal, deployment-safe, and includes post-deploy monitoring or follow-up work."
    options: [approve, reject]
    on_reject: retry

  - id: ready-for-implement
    type: gate
    message: "Execute the hotfix now? Reject to stop after planning and task generation."
    options: [approve, reject]
    on_reject: skip

  - id: implement-if-approved
    type: if
    condition: "{{ steps.ready-for-implement.output.choice == 'approve' }}"
    then:
      - id: implement
        command: speckit.implement
        integration: "{{ inputs.integration }}"