# Superpowers Bridge Configuration Template
#
# This template configures bridge behavior only.
# It does not define remote fallback rules or bundled skill content.

discovery:
  # Search order for installed superpowers skills.
  # workspace => ./.agents/skills
  # global    => ~/.agents/skills
  search_order:
    - workspace
    - global

requirements:
  hard:
    - test-driven-development
    - verification-before-completion

  optional:
    - systematic-debugging
    - receiving-code-review
    - finishing-a-development-branch

commands:
  enable_review: true
  enable_critique: true
  enable_debug: true
  enable_finish: true
  enable_respond: true

# Local override file (recommended for experimentation, gitignored):
# superb-config.local.yml
