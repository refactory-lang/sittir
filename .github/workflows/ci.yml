name: CI

on:
  push:
    branches-ignore: ["sub**"]
  pull_request:
    branches-ignore: ["sub**"]

jobs:
  CI:
    name: CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm run type-check

      - name: Lint generated packages (strict — zero warnings)
        run: npx oxlint --deny-warnings packages/rust/src packages/typescript/src packages/python/src

      - name: Lint
        run: pnpm run lint

      - name: Check .jinja templates (feature 011)
        # Fails when any .jinja file is missing the @generated header,
        # contains a forbidden construct from the authoring subset
        # (extends/macro/include/match/set), or when a YAML template
        # file reappears under a templates/ directory.
        run: npx tsx scripts/check-jinja-templates.ts

      - name: Format check
        run: pnpm run format:check
        continue-on-error: true

      - name: Test
        run: pnpm run test

      - name: Test Coverage
        run: pnpm run test:coverage
        if: matrix.node-version == '20.x'

      - name: Security Audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  # Rust workspace compile check (spec 012 Phase 1 T007).
  # A single cargo-check job — clippy, platform matrix, and release
  # artifacts come in Phase 4 (T053-T057, T064). The parity harness
  # is gated in its own `rust-parity` job below (T049).
  rust:
    name: cargo check --workspace
    runs-on: ubuntu-22.04
    needs: CI
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo check --workspace
        run: cargo check --workspace

  # Cross-engine parity harness (spec 012 T049 / FR-012 / SC-001a +
  # SC-001b). Runs the integration-test crate that loads each
  # grammar's `test-fixtures.json` and asserts the Rust engine
  # reproduces the TS engine's captured render + roundtrip outputs.
  #
  # At MVP the three per-grammar test cases are `#[ignore]` until the
  # flank-metadata plumbing lands (see
  # `rust/crates/sittir-parity-tests/tests/parity.rs`). The job still
  # runs `--ignored` so the harness compiles, fixtures load, and
  # diagnostic output surfaces in CI logs for regression detection;
  # `continue-on-error: true` keeps the overall pipeline green while
  # the gap closes. Flip to required-gate when all three tests pass
  # un-ignored.
  rust-parity:
    name: cargo test parity (advisory)
    runs-on: ubuntu-22.04
    needs: rust
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install Node (for codegen + fixture regen)
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: Regenerate fixtures
        # The test-fixtures.json files are checked in, but regenerating
        # here catches drift between committed fixtures and current
        # render behavior — the pipeline should fail LOUDLY if a codegen
        # change silently shifts the capture without a matching commit.
        run: |
          npx tsx packages/codegen/src/cli.ts --grammar rust --all --rust-render --output packages/rust/src
          npx tsx packages/codegen/src/cli.ts --grammar typescript --all --rust-render --output packages/typescript/src
          npx tsx packages/codegen/src/cli.ts --grammar python --all --rust-render --output packages/python/src
      - name: Fixture check — no drift from committed
        run: git diff --exit-code packages/*/rust-render/test-fixtures.json
      - name: cargo test parity (--ignored for diagnostic)
        run: cargo test -p sittir-parity-tests --test parity -- --ignored --nocapture
