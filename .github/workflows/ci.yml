name: CI

on:
  push:
    branches-ignore: ["sub**"]
  pull_request:
    branches-ignore: ["sub**"]

# Crate-download resilience for every cargo-running job. The napi builds fetch
# from a cold registry and intermittently die on `download of <crate> failed` /
# `[16] Error in the HTTP2 framing layer` (libcurl's HTTP/2 connection collapsing
# mid-fetch). Disabling HTTP/2 multiplexing forces one request per connection,
# sidestepping the framing bug; retry covers other transient blips. Workflow-level
# so it's a single source across CI / cargo-check / napi-build / parity.
# (The local-dev equivalent lives in the gitignored .cargo/config.toml.)
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  CI:
    name: CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm run build` compiles the napi crates from a cold cargo registry.
      # Cache the registry + target dir so cached crates skip the download path
      # entirely (the `.cargo/config.toml` net hardening covers the cold-cache run).
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm run type-check

      - name: Lint generated packages (strict — zero warnings)
        run: npx oxlint --deny-warnings packages/rust/src packages/typescript/src packages/python/src

      - name: Lint
        run: pnpm run lint

      - name: Check .jinja templates (feature 011)
        # Fails when any .jinja file is missing the @generated header,
        # contains a forbidden construct from the authoring subset
        # (extends/macro/include/match/set), or when a YAML template
        # file reappears under a templates/ directory.
        run: npx tsx packages/cli/src/cli.ts tool check-jinja

      - name: Principle #14 ratchet (propose-14, R0)
        # Fails when any pipeline module's non-conforming signature count
        # EXCEEDS packages/codegen/.principle14-baseline.json - the ratchet
        # only goes down. Sweep rows (R1-R4) lower the baseline in-PR.
        run: npx tsx packages/cli/src/cli.ts tool propose-14

      - name: Format check
        run: pnpm run format:check
        continue-on-error: true

      - name: Test
        # `-- --coverage` instruments this same whole-suite run instead of
        # running it a second time — test-and-record.ts treats --coverage
        # as compatible with recording (see its own doc comment). This used
        # to be two separate steps (`pnpm run test` then `pnpm run
        # test:coverage`), each running all ~208 test files.
        run: pnpm run test -- --coverage

      - name: Security Audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  # Spec 016 T009 (follow-up) — regression-checker (native mode).
  #
  # RETIRED the TS/JS-mode sibling job (`regression-checker`, compared
  # against `specs/016-parity-regressions/baselines/ts.json` via
  # `SITTIR_BACKEND=typescript`) — it drove the deprecated js/dispatch
  # engine, which is no longer the source of truth (the Rust native
  # engine is, per CLAUDE.md) and per
  # docs/superpowers/specs/2026-04-27-js-backend-rename-design.md,
  # `SITTIR_BACKEND=typescript` isn't even the supported non-native
  # selector anymore (`js` is). This native-mode job is the durable gate
  # going forward; `ts.json` / the retired job's history remain under
  # specs/016-parity-regressions/ as a record of the completed feature.
  #
  # Gated on `napi-build` so the linux x86_64-gnu `.node` artifacts
  # produced by that matrix are available to dispatch
  # `SITTIR_BACKEND=native` through the shared native boundary.
  #
  # The check-baseline-regression script is backend-agnostic (the same
  # five verdict rules apply to both `ts.json` and `native.json` per
  # `contracts/baseline-json.md`); only the input differs. This job
  # downloads the `bindings-x86_64-unknown-linux-gnu` artifact, places
  # the `.node` files where the per-grammar napi loaders expect them,
  # collects the head baseline, and diffs against the base SHA's
  # committed `native.json`.
  #
  # The `rust-parity` and `napi-build` jobs above run the parity test
  # suite under `--ignored` with `continue-on-error: true` — they do
  # NOT read the baseline JSONs, so a native-count drop would slip
  # through them. This job is the durable gate.
  #
  # Skipped on direct pushes (no base ref to diff against). Only runs
  # on `pull_request` events.
  regression-checker-native:
    name: baseline regression check
    runs-on: ubuntu-22.04
    needs: napi-build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download napi `.node` artifacts (linux x86_64-gnu)
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: /tmp/016-bindings
      - name: Stage `.node` artifacts next to napi crate
        # The artifact preserves the grammar-owned napi crate subdirs from
        # the upload step (`rust/crates/sittir-*/*.node`). Copy them
        # back into the workspace so each grammar loader picks up its native
        # binary at runtime.
        run: |
          if [ -d /tmp/016-bindings/rust/crates ]; then
            cp -R /tmp/016-bindings/rust/crates/. rust/crates/
          else
            # Fallback if the artifact was uploaded flat
            for crate in rust typescript python; do
              find /tmp/016-bindings -path "*sittir-${crate}/*.node" -exec cp {} "rust/crates/sittir-${crate}/" \;
            done
          fi
          find rust/crates -name "*.node" -print
      - name: Resolve base SHA
        id: base
        run: echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
      - name: Snapshot base native.json
        run: |
          mkdir -p /tmp/016-base
          git show "${{ steps.base.outputs.sha }}:specs/016-parity-regressions/baselines/native.json" \
            > /tmp/016-base/native.json
      - name: Collect head native.json
        run: |
          mkdir -p /tmp/016-head
          SITTIR_BACKEND=native npx tsx packages/tools/src/scripts/collect-baseline.ts \
            > /tmp/016-head/native.json
      - name: Diff native.json against base (verdict rules)
        run: |
          npx tsx packages/tools/src/scripts/check-baseline-regression.ts \
            --base /tmp/016-base/native.json \
            --head /tmp/016-head/native.json

  # Spec 054 — perf regression-checker (native only). Compares the FFI
  # roundtrip + call-count from a fresh native-backend metrics run against
  # the committed `specs/054-post-016-perf-tracking/baselines/perf-native.json`.
  # Regressions > 10% on `ffi.meanRoundtripMs` or `ffi.totalCalls` fail the
  # build EXCEPT when `SITTIR_METRICS_FFI_WARN_ONLY=1` (set below for the
  # one-month calibration window per FR-008). Skipped when napi build
  # artifacts are unavailable. Cross-platform deltas auto-skip via the
  # check's `[INFO] platform mismatch` branch — the perf gate is darwin-only
  # for now (the baseline was collected on Apple M4 Pro). Linux baseline
  # collection is a follow-up; until then, the gate is a no-op on linux
  # CI but the metrics artifacts still get uploaded for inspection.
  perf-regression-checker:
    name: perf regression check (warn-only)
    runs-on: ubuntu-22.04
    needs: napi-build
    if: github.event_name == 'pull_request'
    env:
      # Warn-only window: 2026-07-19 → 2026-08-18 per spec 054 FR-008.
      # Re-baselined on this date because FFI round-trip tracking (recordFfi)
      # had been drafted but never wired to a real call site since the
      # original 2026-04-26 baseline — see the boundary.ts render() wiring.
      # Flip to enforcing by removing this env block after the window.
      SITTIR_METRICS_FFI_WARN_ONLY: "1"
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download napi `.node` artifacts (linux x86_64-gnu)
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: /tmp/054-bindings
      - name: Stage `.node` artifacts next to napi crates
        run: |
          if [ -d /tmp/054-bindings/rust/crates ]; then
            cp -R /tmp/054-bindings/rust/crates/. rust/crates/
          else
            for crate in rust typescript python; do
              find /tmp/054-bindings -path "*sittir-${crate}/*.node" -exec cp {} "rust/crates/sittir-${crate}/" \;
            done
          fi
      - name: Collect fresh metrics (native backend)
        run: |
          SITTIR_BACKEND=native SITTIR_METRICS=1 \
            npx tsx packages/tools/src/scripts/collect-baseline.ts > /dev/null
      - name: Check perf baseline (warn-only window)
        run: pnpm exec tsx packages/cli/src/cli.ts tool check-perf
      - name: Upload metrics artifact for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-native-${{ github.run_id }}
          path: metrics-native.json
          if-no-files-found: warn

  # Rust workspace compile check (spec 012 Phase 1 T007).
  # A single cargo-check job — clippy, platform matrix, and release
  # artifacts come in Phase 4 (T053-T057, T064). The parity harness
  # is gated in its own `rust-parity` job below (T049).
  rust:
    name: cargo check --workspace
    runs-on: ubuntu-22.04
    needs: CI
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo check --workspace
        run: cargo check --workspace

  # Cross-engine parity harness (spec 012 T049 / FR-012 / SC-001a +
  # SC-001b). Runs the integration-test crate that loads each
  # grammar's `test-fixtures.json` and asserts the Rust engine
  # reproduces the TS engine's captured render + roundtrip outputs.
  #
  # **Important: continue-on-error scope** — the JOB-level
  # `continue-on-error: true` was removed during 016 (Cluster A
  # post-review) because it was masking fixture data-rot: the python
  # comprehensions cluster failed for 6 fixtures NOT because of any
  # template bug but because `test-fixtures.json` was captured at
  # commit 5c89aeda (pre-spec-012) and never refreshed when readNode +
  # templates moved on. The "Fixture check" step below is now
  # ENFORCING (no per-step continue-on-error → step inherits job
  # default which is fail-on-error). The `cargo test parity` step
  # below it KEEPS its advisory shape via per-step
  # `continue-on-error: true` while the `#[ignore]`'d test cases
  # await the flank-metadata plumbing
  # (`rust/crates/sittir-parity-tests/tests/parity.rs`). Flip the
  # parity-test step to enforcing once those tests pass un-ignored.
  rust-parity:
    name: cargo test parity (advisory)
    # ubuntu-latest (not ubuntu-22.04, unlike the other rust-* jobs — this
    # one doesn't produce a distributable artifact so there's no glibc-
    # compat target to pin to): the "Regenerate fixtures" step's `npx tsx
    # ... gen --all` runs `tree-sitter generate`, and the locked
    # tree-sitter-cli@0.26.9 prebuilt binary requires GLIBC 2.39, which
    # ubuntu-22.04's 2.35 doesn't have. `CI (24.x)` already runs the same
    # codegen path successfully on ubuntu-latest.
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install Node (for codegen + fixture regen)
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      # Fixture extraction (below) requires a NATIVE engine loaded via
      # backend: 'native' — without a freshly built release .node, it
      # silently sees 0 candidates. This job never built one before, so
      # "Regenerate fixtures" was either producing an empty extraction
      # (masked by the "Fixture check" glob bug below, now fixed) or —
      # after emitParityFixtures's clobber guard was added — would fail
      # outright instead. Build once, host-platform-only (no --target /
      # cross-compile matrix needed here, unlike napi-build/napi-publish).
      - name: Build native release bindings (for fixture extraction)
        run: |
          for crate in rust typescript python; do
            pnpm -C "rust/crates/sittir-${crate}" exec napi build --platform --release
          done
      - name: Regenerate fixtures
        # The test-fixtures.json files are checked in, but regenerating
        # here catches drift between committed fixtures and current
        # render behavior — the pipeline fails LOUDLY if a codegen
        # change silently shifts the capture without a matching commit.
        run: |
          npx tsx packages/cli/src/cli.ts gen --grammar rust --all --output packages/rust/src
          npx tsx packages/cli/src/cli.ts gen --grammar typescript --all --output packages/typescript/src
          npx tsx packages/cli/src/cli.ts gen --grammar python --all --output packages/python/src
      - name: Fixture check — no drift from committed
        # ENFORCING (no per-step continue-on-error). 016 Cluster A
        # established that fixture drift → silent data-rot → 6
        # parity tests failing for the wrong reason. Failing CI
        # forces the next maintainer to commit the regen output
        # alongside whatever codegen change caused the drift.
        #
        # Path fixed to match the real output location (no `render/`
        # segment — see packages/codegen/src/emitters/render-module-paths.ts).
        # The old glob matched zero files, so this check was a permanent
        # no-op regardless of what "Regenerate fixtures" actually did.
        run: git diff --exit-code rust/crates/sittir-*/test-fixtures.json
      - name: cargo test parity (--ignored for diagnostic)
        # Advisory until #[ignore]'d tests pass un-ignored — see job
        # docstring above.
        continue-on-error: true
        run: cargo test -p sittir-parity-tests --test parity -- --ignored --nocapture

  # Spec 012 Phase 4 — platform matrix for napi `.node` artifact builds
  # (T053 macOS arm64/x64, T054 Linux x64 glibc/musl, T055 Linux arm64
  # glibc/musl, T056 Windows x64). Each matrix job runs the parity
  # suite as well (T061 — SC-006 requires platform coverage be parity-
  # gated, not just compile-gated).
  #
  # Cross-compile setup uses `napi-rs/setup-node-and-napi@v3` for the
  # musl + arm64 targets that need a sysroot; native targets use the
  # standard `dtolnay/rust-toolchain@stable` action.
  napi-build:
    name: napi build (${{ matrix.target }})
    needs: rust
    runs-on: ${{ matrix.host }}
    continue-on-error: true
    strategy:
      fail-fast: false
      # Only x86_64-unknown-linux-gnu builds on every push/PR — it's the
      # sole artifact regression-checker-native + perf-regression-checker
      # (below) actually consume; nothing else in ci.yml touches the
      # other 6 legs' output. Those 6 are pure "does it compile on
      # platform X" checks with no per-PR consumer: release.yml's
      # napi-publish job already builds (and verifies) all 7 targets
      # independently on tag push before publishing, so building them
      # again here on every PR was pure duplicated CI time — doubly so
      # since continue-on-error above already meant nothing was gated on
      # their result. Gated to tag pushes so a platform-specific break
      # still surfaces (at release time) without paying the cost per PR.
      #
      # `matrix.*` isn't available in job-level `if:` (GitHub Actions
      # evaluates job `if:` before matrix expansion), so the matrix
      # itself has to be conditional — computed via fromJSON rather than
      # a plain `include:` list.
      matrix:
        include: ${{ startsWith(github.ref, 'refs/tags/v') && fromJSON('[{"target":"aarch64-apple-darwin","host":"macos-14","cross":false,"buildFlag":""},{"target":"x86_64-apple-darwin","host":"macos-13","cross":false,"buildFlag":""},{"target":"x86_64-unknown-linux-gnu","host":"ubuntu-22.04","cross":false,"buildFlag":""},{"target":"x86_64-unknown-linux-musl","host":"ubuntu-22.04","cross":true,"buildFlag":"--cross-compile"},{"target":"aarch64-unknown-linux-gnu","host":"ubuntu-22.04","cross":true,"buildFlag":"--use-napi-cross"},{"target":"aarch64-unknown-linux-musl","host":"ubuntu-22.04","cross":true,"buildFlag":"--cross-compile"},{"target":"x86_64-pc-windows-msvc","host":"windows-2022","cross":false,"buildFlag":""}]') || fromJSON('[{"target":"x86_64-unknown-linux-gnu","host":"ubuntu-22.04","cross":false,"buildFlag":""}]') }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Rust toolchain (stable, ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # `napi-rs/setup-node-and-napi@v3` was removed upstream (repo no
      # longer resolves), which failed EVERY matrix leg — GitHub Actions
      # fails job setup if any referenced action can't be resolved, even
      # one gated behind `if:`. Replaced with the current napi-rs CLI's
      # own cross-compile flags (see `buildFlag` above): musl targets
      # cross-compile via cargo-zigbuild (needs zig + cargo-zigbuild on
      # PATH), the gnu arm64 target uses napi's bundled cross-toolchain
      # (`--use-napi-cross`, no extra setup needed).
      - name: Setup zig (musl cross-compile)
        if: contains(matrix.target, 'musl')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
      - name: Install cargo-zigbuild (musl cross-compile)
        if: contains(matrix.target, 'musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # `shell: bash` is required here: this `for` loop is bash syntax, but
      # windows-latest runners default `run:` steps to PowerShell, which
      # can't parse it ("Missing opening '(' after keyword 'for'").
      - name: napi build — grammar-owned native packages
        shell: bash
        run: |
          for crate in rust typescript python; do
            pnpm -C "rust/crates/sittir-${crate}" exec napi build --platform --release --target "${{ matrix.target }}" ${{ matrix.buildFlag }}
          done
      # `--no-default-features` is required for a bare `cargo test
      # --workspace`: sittir-{rust,typescript,python} default to
      # `napi-bindings` ON (needed for `napi build` above), and workspace
      # feature unification means a plain `cargo test --workspace` links
      # each grammar crate's own test binary WITH napi symbols — which
      # only resolve inside a real Node.js host, so the standalone test
      # binary fails at link time. sittir-parity-tests already requests
      # `default-features = false` on these deps, but that request gets
      # unified away unless the whole workspace test run also disables it.
      - name: cargo test --workspace (skip cross-compiled targets)
        if: matrix.cross == false
        run: cargo test --workspace --no-default-features --target ${{ matrix.target }}
      # T061 — every platform job runs the parity suite (SC-006 gate).
      # On cross-compiled hosts we still invoke the test binary build
      # but skip execution (the resulting binary cannot run on the CI
      # host); the failure path is the build step above.
      - name: cargo test parity (native targets only)
        if: matrix.cross == false
        run: cargo test -p sittir-parity-tests --test parity --target ${{ matrix.target }} -- --ignored --nocapture
      # `if: !cancelled()` — without this, a failure in either test step
      # above (e.g. the pre-existing native_parser.rs failure that
      # currently fails on every platform) skips this step entirely by
      # GitHub Actions' default fail-fast-within-job behavior, even
      # though `napi build` already produced a valid, working `.node`.
      # regression-checker-native and perf-regression-checker both
      # `needs: napi-build` and download `bindings-x86_64-unknown-linux-gnu`
      # specifically — without the artifact, they fail outright (or, when
      # blocked on the full 7-target matrix pre-#167, could never even
      # start). Upload regardless of test outcome; the binary itself is
      # still a valid build artifact independent of test pass/fail.
      - name: Upload `.node` artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: |
            rust/crates/sittir-*/*.node
          if-no-files-found: ignore

  # Spec 012 T060 — surface parity counts in PR job summary so review
  # has visibility on engine drift without spelunking logs. Aggregates
  # the per-platform parity results from `napi-build` into one summary.
  parity-summary:
    name: parity counts summary
    needs: napi-build
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Render parity counts to job summary
        run: |
          {
            echo "## Spec 012 parity counts"
            echo ""
            echo "Per-platform parity-suite status from the \`napi-build\` matrix is"
            echo "available in each job log under \`cargo test parity\`. The headline"
            echo "baseline (asserted by \`pnpm -F @sittir/codegen test\`):"
            echo ""
            echo "| grammar | fromPass | rtPass | factoryPass |"
            echo "|--------:|---------:|-------:|------------:|"
            echo "| rust       | 130/148 | 121/136 | 421/959 |"
            echo "| typescript | 127/137 |  96/112 | 387/916 |"
            echo "| python     | 107/114 | 105/115 | 205/860 |"
          } >> "$GITHUB_STEP_SUMMARY"

  # Spec 012 T064 — scope-boundary enforcement. Fails the build if
  # WASM artifacts leak into the MVP, if `cargo publish` reappears in
  # any workflow, if generated render crates contain non-source files,
  # or if disallowed derive-macro crates show up in the dep graph.
  scope-boundaries:
    name: assert scope boundaries
    needs: rust
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: assert scope boundaries
        run: bash scripts/assert-scope-boundaries.sh
