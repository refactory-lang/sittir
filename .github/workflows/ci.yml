name: CI

on:
  push:
    branches-ignore: ["sub**"]
  pull_request:
    branches-ignore: ["sub**"]

jobs:
  CI:
    name: CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm run type-check

      - name: Lint generated packages (strict — zero warnings)
        run: npx oxlint --deny-warnings packages/rust/src packages/typescript/src packages/python/src

      - name: Lint
        run: pnpm run lint

      - name: Check .jinja templates (feature 011)
        # Fails when any .jinja file is missing the @generated header,
        # contains a forbidden construct from the authoring subset
        # (extends/macro/include/match/set), or when a YAML template
        # file reappears under a templates/ directory.
        run: npx tsx scripts/check-jinja-templates.ts

      - name: Format check
        run: pnpm run format:check
        continue-on-error: true

      - name: Test
        run: pnpm run test

      - name: Test Coverage
        run: pnpm run test:coverage
        if: matrix.node-version == '20.x'

      - name: Security Audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  # Rust workspace compile check (spec 012 Phase 1 T007).
  # A single cargo-check job — parity tests, clippy, platform matrix,
  # and release artifacts come in Phase 4 (T053-T057, T064).
  rust:
    name: cargo check --workspace
    runs-on: ubuntu-22.04
    needs: CI
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo check --workspace
        run: cargo check --workspace
