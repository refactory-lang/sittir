# Release Workflow with Changesets
#
# Uses Changesets to automate versioning and publishing to npm.
# Supports npm Trusted Publishers (OIDC) for secure, token-free publishing.
#
# How it works:
# 1. On push to master, Changesets creates a "Version Packages" PR
# 2. When that PR is merged, packages are automatically published to npm
# 3. GitHub releases are created automatically
#
# Setup — npm Trusted Publishers (OIDC):
# 1. Enable "Trusted Publishers" on your npm package settings page
# 2. Add GitHub Actions as trusted publisher (repo + workflow: release.yml)
# 3. No NPM_TOKEN needed!
#
# Fallback: set NPM_TOKEN in repository secrets for token-based auth.

name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Create releases and tags
      pull-requests: write  # Create version PRs
      id-token: write       # Required for OIDC trusted publishers

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install npm v11 (OIDC fix)
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Enable auto-merge on version PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:changeset-release/master`
            });
            if (pulls.length === 0) return;
            const pr = pulls[0];
            await github.graphql(`
              mutation($id: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $id, mergeMethod: SQUASH }) {
                  pullRequest { number }
                }
              }
            `, { id: pr.node_id });
            console.log(`Auto-merge enabled on PR #${pr.number}`);

  # Spec 012 T057 — platform-subpackage publication for the napi
  # `.node` artifacts produced by the `napi-build` matrix in `ci.yml`.
  # Triggered on git tags matching `v*` (separately from the
  # changesets-driven npm release above; the changesets path publishes
  # the JS-side `@sittir/{rust,typescript,python}` packages, this path
  # publishes the platform-suffixed `*-native-<target>` siblings).
  #
  # Flow per napi-rs's reference release.yml:
  # 1. Build the napi `.node` artifacts on each matrix host.
  # 2. Download all artifacts to a single host.
  # 3. `napi artifacts` repacks them into per-target subpackages
  #    (`@sittir/rust-native-darwin-arm64`, etc.).
  # 4. `npm publish` each subpackage with provenance.
  napi-publish:
    name: napi publish (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            host: macos-14
            cross: false
          - target: x86_64-apple-darwin
            host: macos-13
            cross: false
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-22.04
            cross: false
          - target: x86_64-unknown-linux-musl
            host: ubuntu-22.04
            cross: true
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-22.04
            cross: true
          - target: aarch64-unknown-linux-musl
            host: ubuntu-22.04
            cross: true
          - target: x86_64-pc-windows-msvc
            host: windows-2022
            cross: false
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Rust toolchain (stable, ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Setup cross-compile (musl / arm64)
        if: matrix.cross == true
        uses: napi-rs/setup-node-and-napi@v3
        with:
          target: ${{ matrix.target }}
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: napi build (release) — @sittir/rust-native
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }}
        working-directory: rust/crates/sittir-rust-napi
      - name: napi build (release) — @sittir/typescript-native
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }}
        working-directory: rust/crates/sittir-typescript-napi
      - name: napi build (release) — @sittir/python-native
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }}
        working-directory: rust/crates/sittir-python-napi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: |
            rust/crates/sittir-rust-napi/*.node
            rust/crates/sittir-typescript-napi/*.node
            rust/crates/sittir-python-napi/*.node
          if-no-files-found: error

  napi-artifacts-publish:
    name: aggregate + publish platform subpackages
    if: startsWith(github.ref, 'refs/tags/v')
    needs: napi-publish
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download all bindings artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bindings-*
          merge-multiple: false
      - name: napi artifacts — repack into platform subpackages
        run: |
          for crate in sittir-rust-napi sittir-typescript-napi sittir-python-napi; do
            (cd "rust/crates/${crate}" && pnpm exec napi artifacts --dir ../../../artifacts)
          done
      - name: Publish platform subpackages to npm
        run: |
          for crate in sittir-rust-napi sittir-typescript-napi sittir-python-napi; do
            (cd "rust/crates/${crate}" && pnpm exec napi prepublish --tag latest --skip-gh-release)
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
